<!DOCTYPE html>
<html>
        <head>
            <title>Ruleset styles</title>
            <style>
                h1, h2, h3, h4 {
                    color: green;
                    font-size: 30px;
                    background-color: darkgoldenrod;
                }
                h1{
                    color: coral;
                    color: rgb(201, 63, 41);
                }

                #mrJones{
                    color: burlywood !important;
                }
                .uppercase{
                    text-transform: uppercase;
                    color: hotpink !important;
                    background-color: black;
                }

                .important{
                    color: orchid;   
                }

                #the-one{
                    color: blue;
                }
                

            </style>
        </head>
        <body>
            <h1 class="uppercase">
                Heading <span id="the-one"> One</span></h1>
            <h2 class="important uppercase">Heading 2</h2>
            <h3>Heading 3</h3>
            <h4 class="important">Heading 4</h4>
            <h1 class="important">Heading 1</h1>
            <h2>Heading 2</h2>
            <h3 class="important uppercase" id="mrJones" style="color: blueviolet;" >Heading 3</h3>
            <h4>Heading 4</h4>
        </body>
</html>

<html>

            <title>Inline styles</title>
        </head>
        <body>
            <h1 style="background-color: green; font-size: 30px; color: #ff0011;">
                Heading <span style="color: blue;"> One</span></h1>

            <h4 style="background-color: rgb(177, 117, 221);font-size: 30px; color: darkgoldenrod">Heading 4</h4>
            <h1 style="background-color: rgb(177, 117, 221);font-size: 20px; color: rgba(201, 63, 41, 8.723);">Heading 1</h1>
            <h2 style="background-color: rgb(177, 117, 221);font-size: 20px; color: rgb(201, 63, 41);">Heading 2</h2>
            <h3 style="background-color: green; font-size: 20px; color: rgb(201, 63, 41);">Heading 3</h3>
            <h4 style="background-color: rgb(177, 117, 221); font-size: 20px; color: rgb(201, 63, 41);">Heading 4</h4>

</html>
